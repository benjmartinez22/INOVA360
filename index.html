<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INOVA360°</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #4caf50;
      --accent-glow: rgba(76,175,80,.4);
      --radius: 10px;
    }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ─── SPLASH ─── */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    @keyframes dropBounce {
      0%   { opacity: 0; transform: translateY(-90px); }
      58%  { opacity: 1; transform: translateY(9px); }
      72%  { transform: translateY(-5px); }
      83%  { transform: translateY(3px); }
      92%  { transform: translateY(-1px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmerW {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }
    @keyframes fadeBar {
      from { opacity: 0; } to { opacity: 1; }
    }

    .sp-logo {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 46px; font-weight: 800;
      letter-spacing: -1.5px; line-height: 1;
      display: flex; align-items: baseline;
    }
    .sp-w1 { display: inline-block; color: #4caf50; animation: dropBounce 0.85s 0.1s cubic-bezier(.215,.61,.355,1) both; }
    .sp-w2 { display: inline-block; color: #fff;    animation: dropBounce 0.85s 0.52s cubic-bezier(.215,.61,.355,1) both; }
    .sp-bar {
      width: 160px; height: 2px;
      background: rgba(76,175,80,.12);
      border-radius: 99px; overflow: hidden;
      position: relative; opacity: 0;
      animation: fadeBar 0.4s 0.95s both;
    }
    .sp-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(90deg,
        transparent 0%, rgba(76,175,80,.2) 20%,
        rgba(76,175,80,.9) 50%, rgba(76,175,80,.2) 80%, transparent 100%);
      animation: shimmerW 1.5s 0.95s ease infinite;
      border-radius: 99px;
    }

    /* ─── LOGIN ─── */
    #login { width: 400px; max-width: 92vw; opacity: 0; transition: opacity 0.5s ease; }
    #login.show { opacity: 1; }

    .brand { text-align: center; margin-bottom: 32px; }
    .brand-name {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 3px;
      color: rgba(255,255,255,.35);
    }

    .heading { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .subheading { font-size: 13px; color: rgba(255,255,255,.4); text-align: center; margin-bottom: 28px; }

    .toggle {
      display: flex;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 100px; padding: 4px; gap: 3px; margin-bottom: 24px;
    }
    .toggle-btn {
      flex: 1; padding: 9px 14px; border-radius: 100px;
      border: none; background: none;
      color: rgba(255,255,255,.4); cursor: pointer;
      font-size: 13px; font-weight: 600;
      transition: all .2s; font-family: inherit;
    }
    .toggle-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .form { display: none; }
    .form.active { display: block; }

    label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.45); margin-bottom: 5px; }
    input {
      width: 100%; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius); color: #fff;
      padding: 11px 13px; font-size: 14px; margin-bottom: 14px;
      outline: none; font-family: inherit; transition: border-color .2s;
    }
    input:focus { border-color: rgba(76,175,80,.5); }
    input::placeholder { color: rgba(255,255,255,.2); }

    .pass-wrap { position: relative; margin-bottom: 14px; }
    .pass-wrap input { margin-bottom: 0; padding-right: 42px; }
    .pass-toggle {
      position: absolute; right: 11px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,.3); cursor: pointer; font-size: 14px;
    }

    .error-box {
      display: none;
      background: rgba(218,54,51,.08); border: 1px solid rgba(218,54,51,.22);
      color: #ff7b72; padding: 9px 13px;
      border-radius: var(--radius); font-size: 12.5px; margin-bottom: 12px;
    }
    .error-box.show { display: block; }

    .btn-primary {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 4px; font-family: inherit; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }

    .link-row { text-align: center; margin-top: 12px; }
    .link-btn {
      background: none; border: none; color: rgba(255,255,255,.3);
      font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit;
    }
    .link-btn:hover { color: rgba(255,255,255,.6); }

    .divider { text-align: center; color: rgba(255,255,255,.2); font-size: 12px; margin: 16px 0; position: relative; }
    .divider span { background: #000; padding: 0 8px; position: relative; z-index: 1; }
    .divider::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,.08); }

    .btn-secondary {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.4); border-radius: var(--radius);
      padding: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,.25); color: rgba(255,255,255,.7); }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="sp-logo">
      <span class="sp-w1">INOVA</span><span class="sp-w2">360&#xB0;</span>
    </div>
    <div class="sp-bar"><div class="sp-shimmer"></div></div>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <div class="brand"><div class="brand-name">INOVA360&#xB0;</div></div>

    <div class="heading">Bienvenido</div>
    <div class="subheading">Selecciona tu tipo de acceso para continuar</div>

    <div class="toggle">
      <button class="toggle-btn active" onclick="setRole('staff')">Administrador</button>
      <button class="toggle-btn"        onclick="setRole('client')">Colaborador</button>
    </div>

    <!-- Administrador -->
    <div id="form-staff" class="form active">
      <label>Usuario o RUT</label>
      <input id="staff-user" type="text" placeholder="12.345.678-9"
             oninput="onStaffInput(event)"
             onkeydown="if(event.key==='Enter') loginAdmin()" />

      <label>Contrase&#xF1;a</label>
      <div class="pass-wrap">
        <input id="staff-pass" type="password" placeholder="Ingresa tu contrase&#xF1;a"
               onkeydown="if(event.key==='Enter') loginAdmin()" />
        <button class="pass-toggle" onclick="togglePass('staff-pass',this)">&#128065;</button>
      </div>

      <div id="staff-err" class="error-box"></div>
      <button class="btn-primary" onclick="loginAdmin()">Iniciar sesi&#xF3;n</button>
      <div class="link-row"><button class="link-btn">&#x3F;Olvidaste tu contrase&#xF1;a?</button></div>
    </div>

    <!-- Colaborador -->
    <div id="form-client" class="form">
      <label>RUT</label>
      <input id="client-rut" type="text" placeholder="12.345.678-9"
             oninput="onRutInput(event)"
             onkeydown="if(event.key==='Enter') loginColab()" />

      <label>Contrase&#xF1;a</label>
      <div class="pass-wrap">
        <input id="client-pass" type="password" placeholder="Ingresa tu contrase&#xF1;a"
               onkeydown="if(event.key==='Enter') loginColab()" />
        <button class="pass-toggle" onclick="togglePass('client-pass',this)">&#128065;</button>
      </div>

      <div id="client-err" class="error-box"></div>
      <button class="btn-primary" onclick="loginColab()">Iniciar sesi&#xF3;n</button>
      <div class="link-row"><button class="link-btn">&#x3F;Olvidaste tu contrase&#xF1;a?</button></div>

      <div class="divider"><span>&#x3F;Primera vez aqu&#xED;?</span></div>
      <button class="btn-secondary">Crear cuenta de colaborador</button>
    </div>
  </div>

  <script>
    /* ── Splash ── */
    setTimeout(function() {
      document.getElementById('splash').classList.add('hide');
      document.getElementById('login').classList.add('show');
    }, 3000);

    /* ── Helpers ── */
    function setRole(r) {
      document.querySelectorAll('.toggle-btn').forEach(function(b, i) {
        b.classList.toggle('active', (i===0 && r==='staff') || (i===1 && r==='client'));
      });
      document.getElementById('form-staff').classList.toggle('active', r==='staff');
      document.getElementById('form-client').classList.toggle('active', r==='client');
    }

    function togglePass(id, btn) {
      var inp = document.getElementById(id);
      var hide = inp.type === 'password';
      inp.type = hide ? 'text' : 'password';
      btn.innerHTML = hide ? '&#128584;' : '&#128065;';
    }

    function showErr(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function clearErr(id) { document.getElementById(id).classList.remove('show'); }

    /* ── Normalización ── */
    function normUser(s) { return s.trim().toLowerCase(); }
    function normRUT(s)  { return s.replace(/\./g,'').replace(/-/g,'').toLowerCase().trim(); }

    /* ── Auto-formato RUT ── */
    function formatRUT(val) {
      var clean = val.replace(/[^0-9kK]/g,'').toUpperCase();
      if (!clean) return '';
      if (clean.length === 1) return clean;
      var dv   = clean.slice(-1);
      var body = clean.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
      return body + '-' + dv;
    }
    function onRutInput(e) {
      var pos  = e.target.selectionStart;
      var prev = e.target.value;
      var fmt  = formatRUT(prev);
      e.target.value = fmt;
      var diff = fmt.length - prev.length;
      e.target.setSelectionRange(pos+diff, pos+diff);
    }
    function onStaffInput(e) {
      /* solo formatea si empieza con dígito (es un RUT, no un nombre) */
      if (/^\d/.test(e.target.value.replace(/[^0-9a-zA-Z]/g,''))) onRutInput(e);
    }

    /* ── Credenciales temporales (se reemplazarán por la BD) ── */
    var ADMIN = { user: 'benjaminmartinez', rut: '209192578', pass: '12345678' };
    var COLAB = { rut: '123456789',         pass: 'colab123',  nombre: 'Colaborador' };

    /* ── Login Administrador ── */
    function loginAdmin() {
      clearErr('staff-err');
      var input = document.getElementById('staff-user').value;
      var pass  = document.getElementById('staff-pass').value;
      if (!input || !pass) { showErr('staff-err', 'Completa todos los campos.'); return; }

      var isUser = normUser(input) === ADMIN.user;
      var isRut  = normRUT(input)  === ADMIN.rut;

      if ((isUser || isRut) && pass === ADMIN.pass) {
        window.location.href = 'INOVA360.html?role=admin&nombre=Benjam%C3%ADn%20Mart%C3%ADnez';
        return;
      }
      showErr('staff-err', 'Usuario o contrase&#xF1;a incorrectos.');
    }

    /* ── Login Colaborador ── */
    function loginColab() {
      clearErr('client-err');
      var rut  = document.getElementById('client-rut').value;
      var pass = document.getElementById('client-pass').value;
      if (!rut || !pass) { showErr('client-err', 'Completa todos los campos.'); return; }

      if (normRUT(rut) === COLAB.rut && pass === COLAB.pass) {
        window.location.href = 'INOVA360.html?role=colaborador&nombre=Colaborador';
        return;
      }
      showErr('client-err', 'RUT o contrase&#xF1;a incorrectos.');
    }
  </script>
</body>
</html>
